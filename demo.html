<!DOCTYPE html>
<html>
<head>
    <title>Secure Bank Login</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #004e92, #000428);
            color: white;
            text-align: center;
        }

        .login-box {
            background: white;
            color: black;
            width: 350px;
            margin: 100px auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px black;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid gray;
        }

        button {
            padding: 10px 25px;
            background: #004e92;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #002f5b;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Bank Login</h2>

    <form onsubmit="capture(event)">
        <input type="text" id="user" placeholder="Username" required><br>
        <input type="password" id="pass" placeholder="Password" required><br>
        <button type="submit">Login</button>
    </form>
</div>

<script>
function capture(e){
    e.preventDefault();
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    alert("⚠ Phishing Demo\nCaptured Data:\nUsername: " + u + "\nPassword: " + p);
}
</script>

</body>
</html>
